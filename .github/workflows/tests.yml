name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Composer install
        run: make install

      - name: Debug environment (temporary)
        run: |
          php -r 'echo PHP_OS_FAMILY, " ", php_uname(), "\n";'
          locale
          php -r 'echo "internal_encoding=", mb_internal_encoding(), "\n"; echo "sub=", mb_substitute_character(), "\n";'
          php -r '
            $b = base64_decode("w6nDqQ==");
            echo "base64_decode -> ", bin2hex($b), "\n";
            $m = mb_decode_mimeheader("=?UTF-8?B?w6nDqQ==?=");
            echo "mb_decode_mimeheader -> ", bin2hex($m), "\n";
            require "vendor/autoload.php";
            $u = imap_utf8("=?UTF-8?B?w6nDqQ==?=");
            echo "imap_utf8 -> ", bin2hex($u), "\n";
          '

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration

  parity:
    name: "Parity vs real ext-imap (PHP 8.3)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parity suite
        run: make parity
