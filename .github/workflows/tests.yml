name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      # The runner's base PHP install can have ext-imap already enabled as a
      # shared extension. This "test" job exists to exercise the polyfill
      # itself, so ext-imap must be off here — otherwise bootstrap.php's
      # extension_loaded('imap') guard silently defers to the real extension
      # and these tests stop testing our code at all. (The "parity" job below
      # wants the real extension present, so it's untouched.)
      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ':imap'
          coverage: none

      - name: Composer install
        run: make install

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration

  parity:
    name: "Parity vs real ext-imap (PHP 8.3)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parity suite
        run: make parity
