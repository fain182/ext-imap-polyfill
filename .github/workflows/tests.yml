name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Composer install
        run: make install

      - name: Debug environment (temporary)
        run: |
          php -m | grep -i imap || echo "no ext-imap loaded"
          php -i | grep -iE "pcre|mbstring.func_overload|zend.multibyte|auto_prepend|auto_append"
          php -r '
            $text = "=?UTF-8?B?w6nDqQ==?=";
            $pattern = "/=\?(?P<charset>[^?\s]+)\?(?P<encoding>[BbQq])\?(?P<data>[^?]*)\?=(?:\s+(?==\?[^?\s]+\?[BbQq]\?))?/";
            preg_match($pattern, $text, $m);
            echo "regex data capture -> ", bin2hex($m["data"]), " (", $m["data"], ")\n";
            $direct = base64_decode($m["data"]);
            echo "direct base64_decode of captured data -> ", bin2hex($direct), "\n";
            $result = preg_replace_callback($pattern, function ($mm) {
                $bytes = base64_decode($mm["data"]);
                echo "  inside callback, base64_decode -> ", bin2hex($bytes), "\n";
                return $bytes;
            }, $text);
            echo "preg_replace_callback final result -> ", bin2hex($result), "\n";
            require "vendor/autoload.php";
            $u = imap_utf8($text);
            echo "imap_utf8 -> ", bin2hex($u), "\n";
          '

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration

  parity:
    name: "Parity vs real ext-imap (PHP 8.3)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parity suite
        run: make parity
