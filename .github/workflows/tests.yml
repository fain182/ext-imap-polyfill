name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Composer install
        run: make install

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration

  parity:
    name: "Parity vs real ext-imap (PHP 8.3)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parity suite
        run: make parity
